<article class="flex flex-col items-center text-center">
  <svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 32 32"
    fill="none"
    class="h-10 w-10 text-gold"
    stroke="currentColor"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    aria-hidden="true"
  >
    @switch (icon()) {
      @case ('camera') {
        <path
          d="M7.5 10.5h3.2l1.5-2.5h7.6l1.5 2.5h3.2A2.5 2.5 0 0 1 27 13v10.5A2.5 2.5 0 0 1 24.5 26h-17A2.5 2.5 0 0 1 5 23.5V13a2.5 2.5 0 0 1 2.5-2.5Z"
        />
        <circle cx="16" cy="18" r="5" />
        <path d="M23 14h.01" />
        <path d="M25.5 5.5l.55 1.45 1.45.55-1.45.55-.55 1.45-.55-1.45-1.45-.55 1.45-.55.55-1.45Z" />
      }

      @case ('sparkles') {
        <path d="M16 4l1.55 4.45L22 10l-4.45 1.55L16 16l-1.55-4.45L10 10l4.45-1.55L16 4Z" />
        <path
          d="M24.5 15l1.05 2.95L28.5 19l-2.95 1.05L24.5 23l-1.05-2.95L20.5 19l2.95-1.05L24.5 15Z"
        />
        <path d="M9 17l1.2 3.3 3.3 1.2-3.3 1.2L9 26l-1.2-3.3-3.3-1.2 3.3-1.2L9 17Z" />
      }

      @case ('flower') {
        <circle cx="16" cy="16" r="2.5" />
        <ellipse cx="16" cy="9.5" rx="3.5" ry="4.5" />
        <ellipse cx="22.2" cy="14" rx="3.5" ry="4.5" transform="rotate(72 22.2 14)" />
        <ellipse cx="19.8" cy="21.2" rx="3.5" ry="4.5" transform="rotate(144 19.8 21.2)" />
        <ellipse cx="12.2" cy="21.2" rx="3.5" ry="4.5" transform="rotate(216 12.2 21.2)" />
        <ellipse cx="9.8" cy="14" rx="3.5" ry="4.5" transform="rotate(288 9.8 14)" />
      }

      @case ('guests') {
        <circle cx="12" cy="12" r="3.2" />
        <circle cx="20" cy="12" r="3.2" />
        <path d="M6.5 24c.8-4.2 3-6.3 5.5-6.3S16.7 19.8 17.5 24" />
        <path d="M14.5 24c.8-4.2 3-6.3 5.5-6.3s4.7 2.1 5.5 6.3" />
      }

      @case ('celebration') {
        <!-- Cone -->
        <path d="M10 24.5L14.5 11L24 20L10 24.5Z" />
        <!-- Cone stripes -->
        <path d="M14.6 16.4l4.7 4.7" />
        <path d="M13.1 20l2.7 2.7" />
        <!-- Confetti -->
        <path d="M18.5 8.5c1-.9 2.2-1 3.2-.2" />
        <path d="M23 10.8c1.2-.3 2.2 0 3 .8" />
        <path d="M9.5 11.5l1.7.9" />
        <circle cx="11.5" cy="8.8" r=".9" />
        <circle cx="26.2" cy="15.2" r=".9" />
      }

      @case ('delivery') {
        <path d="M4.5 9.5h14v13h-14z" />
        <path d="M18.5 14h4.3l4.7 5v3.5h-9z" />
        <circle cx="9" cy="24.5" r="2.2" />
        <circle cx="23" cy="24.5" r="2.2" />
      }
    }
  </svg>

  <h3 class="mt-3 font-semibold">
    {{ title() }}
  </h3>
</article>
